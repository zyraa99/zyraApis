<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 · Kesalahan server — Zyrä API</title>
<link rel="icon" href="/src/icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F7F4EC;
  --surface:#FAF8F2;
  --border:rgba(61,57,41,.10);
  --border-2:rgba(61,57,41,.18);
  --ink:#3D3929;
  --ink-2:#6B6553;
  --ink-3:#9C9483;
  --accent:#B5524A;
  --accent-soft:rgba(181,82,74,.13);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ min-height:100vh; }
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  display:flex; align-items:center; justify-content:center;
  padding:24px; position:relative; overflow:hidden;
}
.bg-grid{
  position:absolute; inset:0; z-index:0;
  background-image:radial-gradient(circle, var(--border-2) 1px, transparent 1px);
  background-size:24px 24px;
  mask-image:radial-gradient(ellipse 60% 50% at 50% 40%, black 0%, transparent 72%);
  opacity:.7;
}
.card{
  position:relative; z-index:1;
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; padding:56px 44px;
  max-width:480px; width:100%; text-align:center;
  box-shadow:0 12px 32px rgba(61,57,41,.08);
}
.code{
  font-family:'Source Serif 4',serif; font-weight:600;
  font-size:88px; line-height:1; color:var(--accent);
  margin-bottom:6px;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent); background:var(--accent-soft);
  padding:5px 12px; border-radius:99px; margin-bottom:18px;
}
h1{ font-family:'Source Serif 4',serif; font-size:24px; font-weight:600; margin-bottom:12px; }
p{ font-size:14px; color:var(--ink-2); line-height:1.6; margin-bottom:28px; }
.actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:11px 20px; border-radius:11px; font-size:13.5px; font-weight:600;
  font-family:inherit; cursor:pointer; border:none; transition:transform .15s, opacity .15s, background .15s;
  text-decoration:none;
}
.btn-primary{ background:var(--accent); color:#fff; }
.btn-primary:hover{ opacity:.9; transform:translateY(-1px); }
.btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--border-2); }
.btn-ghost:hover{ background:rgba(61,57,41,.04); transform:translateY(-1px); }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="card">
  <span class="eyebrow">Error 500</span>
  <div class="code">500</div>
  <h1>Ada yang salah di server</h1>
  <p>Permintaan gagal diproses karena kesalahan internal. Bukan salahmu — coba muat ulang, atau kembali beberapa saat lagi.</p>
  <div class="actions">
    <button class="btn btn-ghost" onclick="location.reload()">
      <i class="fas fa-rotate-right"></i> Muat Ulang
    </button>
    <a href="/" class="btn btn-primary">
      <i class="fas fa-house"></i> Ke Beranda
    </a>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</body>
</html>
